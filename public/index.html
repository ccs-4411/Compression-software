<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 AI 影片本地壓縮工具 - 穩定相容版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { 
            max-width: 600px; 
            width: 100%;
            background: #1e293b; 
            padding: 30px; 
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { font-size: 26px; margin-bottom: 10px; text-align: center; color: #fff; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; font-size: 14px; }
        
        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #3b82f6; font-size: 15px; }
        
        select, button { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            font-size: 15px; 
            box-sizing: border-box; 
            background: #0f172a;
            color: #e2e8f0;
        }
        select:focus { outline: none; border-color: #3b82f6; }
        
        .btn-dir {
            background: rgba(59, 130, 246, 0.1);
            border: 2px dashed #3b82f6;
            color: #60a5fa;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .btn-dir:hover { background: rgba(59, 130, 246, 0.2); border-color: #60a5fa; }
        
        .dir-path { font-size: 13px; color: #10b981; display: block; margin-top: 6px; word-break: break-all; }
        
        .btn-start { 
            background: linear-gradient(135deg, #3b82f6, #2563eb); 
            color: white; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s; 
            margin-top: 10px;
            padding: 14px;
            font-size: 16px;
        }
        .btn-start:hover:not(:disabled) { 
            background: linear-gradient(135deg, #2563eb, #1d4ed8); 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        .btn-start:disabled { background: #64748b; cursor: not-allowed; opacity: 0.6; transform: none; box-shadow: none; }
        
        #status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        #status.show { display: block; }
        .status-info { background: #1e40af; color: #93c5fd; }
        .status-success { background: #065f46; color: #10b981; }
        .status-error { background: #7c2d12; color: #fb923c; }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 12px;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            width: 0%;
            transition: width 0.3s;
        }
        
        #log {
            margin-top: 20px;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            height: 160px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            color: #94a3b8;
            white-space: pre-wrap;
        }
        
        .init-status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        .init-idle { background: rgba(148, 163, 184, 0.1); border: 1px solid #475569; color: #94a3b8; }
        .init-loading { background: rgba(245, 158, 11, 0.15); border: 1px solid #f59e0b; color: #fcd34d; }
        .init-ready { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #10b981; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 AI 影片本地壓縮工具</h1>
    <div class="subtitle">⚡ 核心版本：0.11.0 穩定相容版</div>
    
    <div class="init-status init-idle" id="initStatus">
        💡 提示：核心模組就緒，點擊壓縮時將透過沙盒載入核心。
    </div>
    
    <div class="form-group">
        <label>1. 選擇影片來源資料夾（免上傳雲端）</label>
        <button class="btn-dir" id="btnDir">選取本地資料夾</button>
        <span class="dir-path" id="dirPath">尚未選擇資料夾</span>
    </div>

    <div class="form-group">
        <label for="fileSelect">2. 選擇要壓縮的 MP4 影片</label>
        <select id="fileSelect" disabled>
            <option value="">-- 請先選取資料夾 --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="resolution">3. 目標解析度（自動縮放並加黑框置中）</label>
        <select id="resolution">
            <option value="360">360p (640x360)</option>
            <option value="480" selected>480p (854x480)</option>
            <option value="540">540p (960x540)</option>
            <option value="720">720p (1280x720)</option>
        </select>
    </div>

    <button class="btn-start" id="btnStart" disabled>請先選取影片檔案</button>
    
    <div id="status"></div>
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div id="log"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.11.0/ffmpeg.min.js" integrity="sha512-Is8S8ThYI7id9w6G6y24z0u8f/pZlY8CdBm4fMvO4P7at1pSvn96YvAsas8UolNclnZgZbslS08DshU1CnbBcg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
    let ffmpeg = null;
    let ffmpegReady = false;

    let dirHandle = null;
    const fileHandles = new Map();

    const btnDir = document.getElementById('btnDir');
    const fileSelect = document.getElementById('fileSelect');
    const resolutionSelect = document.getElementById('resolution');
    const btnStart = document.getElementById('btnStart');
    const logDiv = document.getElementById('log');
    const dirPathSpan = document.getElementById('dirPath');
    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const initStatus = document.getElementById('initStatus');

    function addLog(message, isError = false) {
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML += `[${time}] ${isError ? '❌ ' : ''}${message}\n`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function updateStatus(message, type = 'info') {
        statusDiv.className = `show status-${type}`;
        statusDiv.textContent = message;
    }

    // 🎯 核心啟動：安全載入 31MB 運算核心
    async function ensureFFmpegReady() {
        if (ffmpegReady && ffmpeg) return true; 

        initStatus.className = 'init-status init-loading';
        initStatus.innerHTML = '⚙️ 正在即時下載並掛載 31MB 全球通用安全核心... (僅首次需下載)';
        addLog('正從 CDN 安全管道拉取核心晶片...');

        try {
            if (!window.FFmpeg) {
                throw new Error('CDN 管道發生異常，請確認您的網路環境是否阻擋了 cdnjs。');
            }
            
            const { createFFmpeg } = window.FFmpeg;
            
            ffmpeg = createFFmpeg({ 
                log: true,
                corePath: 'https://cdnjs.cloudflare.com/ajax/libs/ffmpeg-core/0.11.0/ffmpeg-core.js'
            });

            ffmpeg.setProgress(({ ratio }) => {
                const percent = Math.round(ratio * 100);
                const safePercent = Math.max(0, Math.min(100, percent));
                progressFill.style.width = safePercent + '%';
                updateStatus(`🎬 影片壓縮中... ${safePercent}%`, 'info');
            });

            await ffmpeg.load();
            
            ffmpegReady = true;
            initStatus.className = 'init-status init-ready';
            initStatus.innerHTML = '✅ 安全核心掛載成功！';
            addLog('FFmpeg 核心初始化完畢 ✓');
            return true;
        } catch (err) {
            initStatus.className = 'init-status status-error';
            initStatus.innerHTML = `❌ 核心掛載失敗: ${err.message}`;
            addLog(`初始化失敗: ${err.message}`, true);
            return false;
        }
    }

    // 🎯 背景整理資料夾檔案清單
    async function refreshFilesSilently() {
        if (!dirHandle) return;
        try {
            fileSelect.innerHTML = '<option value="">-- 請選擇影片檔案 --</option>';
            fileHandles.clear();

            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const lowerName = entry.name.toLowerCase();
                    if (entry.name.startsWith('AI_')) continue; 
                    
                    // 修正：同時支援 .mp4 與 .MP4
                    if (lowerName.endsWith('.mp4')) {
                        fileHandles.set(entry.name, entry);
                        const opt = document.createElement('option');
                        opt.value = entry.name;
                        opt.textContent = entry.name;
                        fileSelect.appendChild(opt);
                    }
                }
            }

            if (fileHandles.size > 0) {
                fileSelect.disabled = false;
                btnStart.disabled = false; 
                btnStart.innerText = '開始壓縮並寫入資料夾';
            } else {
                updateStatus('⚠️ 該目錄下沒有找到標準 MP4 影片檔案', 'error');
                btnStart.disabled = true;
                btnStart.innerText = '請先選取影片檔案';
            }
        } catch (e) {
            console.error("背景刷新失敗:", e);
        }
    }

    // 1. 使用者點擊：對接資料夾
    btnDir.addEventListener('click', async () => {
        try {
            dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            dirPathSpan.innerText = `📁 已對接目錄: ${dirHandle.name}`;
            addLog(`已成功開啟本地目錄: ${dirHandle.name}`);

            await refreshFilesSilently();
            if (fileHandles.size > 0) {
                updateStatus(`📁 成功對接，目錄下發現 ${fileHandles.size} 個支援的 MP4 檔案`, 'success');
            }
        } catch (err) {
            if (err.name !== 'AbortError') updateStatus(`對接資料夾失敗: ${err.message}`, 'error');
        }
    }              );

    // 2. 轉碼執行核心
    btnStart.addEventListener('click', async () => {
        const fileName = fileSelect.value;
        if (!fileName) return;

        btnStart.disabled = true;
        btnDir.disabled = true;
        fileSelect.disabled = true;

        const isReady = await ensureFFmpegReady();
        if (!isReady) {
            btnStart.disabled = false;
            btnDir.disabled = false;
            fileSelect.disabled = false;
            return;
        }

        const targetHeight = parseInt(resolutionSelect.value);
        let targetWidth = 854; 
        if (targetHeight === 360) targetWidth = 640;
        if (targetHeight === 540) targetWidth = 960;
        if (targetHeight === 720) targetWidth = 1280;

        progressBar.style.display = 'block';
        progressFill.style.width = '0%';

        try {
            updateStatus('📥 正在對接大檔案管道，載入核心虛擬緩衝區...');
            addLog(`讀取高容量檔案: ${fileName}`);
            
            const fileHandle = fileHandles.get(fileName);
            const file = await fileHandle.getFile();
            
            if (!window.FFmpeg || !window.FFmpeg.fetchFile) {
                throw new Error('FFmpeg 輔助組件未就緒，請重整網頁。');
            }
            const { fetchFile } = window.FFmpeg;
            const videoData = await fetchFile(file);
            
            ffmpeg.FS('writeFile', 'input_large.mp4', videoData);
            
            addLog('檔案就緒，開始配置相容性安全渲染參數...');
            updateStatus('🎬 影片壓縮編碼已啟動...');

            // 補齊：影片黑框置中濾鏡參數與轉碼執行指令
            const blackBoxFilter = `scale=${targetWidth}:${targetHeight}:force_original_aspect_ratio=decrease,pad=${targetWidth}:${targetHeight}:(ow-iw)/2:(oh-ih)/2:black`;
            
            addLog('核心正在計算位元率，開始調度虛擬處理器...');
            await ffmpeg.run(
                '-i', 'input_large.mp4',
                '-vf', blackBoxFilter,
                '-c:v', 'libx264',
                '-crf', '26',
                '-preset', 'fast',
                '-c:a', 'aac',
                '-b:a', '128k',
                'output.mp4'
            );

            addLog('解碼完成！正在將資料導回本地硬碟...');
            const outputData = ffmpeg.FS('readFile', 'output.mp4');

            // 產出新檔名並寫入原資料夾
            const outFileName = `AI_compressed_${targetHeight}p_${fileName}`;
            const newFileHandle = await dirHandle.getFileHandle(outFileName, { create: true });
            const writable = await newFileHandle.createWritable();
            await writable.write(outputData);
            await writable.close();

            // 清理暫存虛擬檔案
            ffmpeg.FS('unlink', 'input_large.mp4');
            ffmpeg.FS('unlink', 'output.mp4');

            updateStatus(`🎉 壓縮成功！已儲存為：${outFileName}`, 'success');
            addLog(`檔案寫入完畢：${outFileName} ✓`);
            
            // 重新刷新選單
            await refreshFilesSilently();

        } catch (err) {
            updateStatus(`壓縮失敗: ${err.message}`, 'error');
            addLog(`執行錯誤: ${err.message}`, true);
        } finally {
            btnStart.disabled = false;
            btnDir.disabled = false;
            fileSelect.disabled = false;
        }
    });
</script>

</body>
</html>
