<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 AI 影片本地壓縮工具 - 託管純淨版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { 
            max-width: 600px; 
            width: 100%;
            background: #1e293b; 
            padding: 30px; 
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { font-size: 26px; margin-bottom: 10px; text-align: center; color: #fff; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; font-size: 14px; }
        
        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #3b82f6; font-size: 15px; }
        
        select, button { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            font-size: 15px; 
            box-sizing: border-box; 
            background: #0f172a;
            color: #e2e8f0;
        }
        select:focus { outline: none; border-color: #3b82f6; }
        
        .btn-dir {
            background: rgba(59, 130, 246, 0.1);
            border: 2px dashed #3b82f6;
            color: #60a5fa;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .btn-dir:hover { background: rgba(59, 130, 246, 0.2); border-color: #60a5fa; }
        
        .dir-path { font-size: 13px; color: #10b981; display: block; margin-top: 6px; word-break: break-all; }
        
        .btn-start { 
            background: linear-gradient(135deg, #3b82f6, #2563eb); 
            color: white; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s; 
            margin-top: 10px;
            padding: 14px;
            font-size: 16px;
        }
        .btn-start:hover:not(:disabled) { 
            background: linear-gradient(135deg, #2563eb, #1d4ed8); 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        .btn-start:disabled { background: #64748b; cursor: not-allowed; opacity: 0.6; transform: none; box-shadow: none; }
        
        #status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        #status.show { display: block; }
        .status-info { background: #1e40af; color: #93c5fd; }
        .status-success { background: #065f46; color: #10b981; }
        .status-error { background: #7c2d12; color: #fb923c; }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 12px;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            width: 0%;
            transition: width 0.3s;
        }
        
        #log {
            margin-top: 20px;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            height: 160px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            color: #94a3b8;
            white-space: pre-wrap;
        }
        
        .init-status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        .init-loading { background: rgba(59, 130, 246, 0.15); border: 1px solid #3b82f6; color: #93c5fd; }
        .init-ready { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #10b981; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 AI 影片本地壓縮工具</h1>
    <div class="subtitle">⚡ 核心版本：0.12.15 本地自託管純淨版</div>
    
    <div class="init-status init-loading" id="initStatus">
        ⚙️ 正在自 Railway 本地磁區掛載獨立安全核心...
    </div>
    
    <div class="form-group">
        <label>1. 選擇影片來源資料夾（免上傳雲端）</label>
        <button class="btn-dir" id="btnDir">選取本地資料夾</button>
        <span class="dir-path" id="dirPath">尚未選擇資料夾</span>
    </div>

    <div class="form-group">
        <label for="fileSelect">2. 選擇要壓縮的 MP4 影片</label>
        <select id="fileSelect" disabled>
            <option value="">-- 請先選取資料夾 --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="resolution">3. 目標解析度（自動縮放並加黑框置中）</label>
        <select id="resolution">
            <option value="360">360p (640x360)</option>
            <option value="480" selected>480p (854x480)</option>
            <option value="540">540p (960x540)</option>
            <option value="720">720p (1280x720)</option>
        </select>
    </div>

    <button class="btn-start" id="btnStart" disabled>等待核心就緒...</button>
    
    <div id="status"></div>
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div id="log"></div>
</div>

<script src="./ffmpeg.min.js"></script>

<script>
    let ffmpeg;
    let ffmpegReady = false;

    let dirHandle = null;
    const fileHandles = new Map();

    const btnDir = document.getElementById('btnDir');
    const fileSelect = document.getElementById('fileSelect');
    const resolutionSelect = document.getElementById('resolution');
    const btnStart = document.getElementById('btnStart');
    const logDiv = document.getElementById('log');
    const dirPathSpan = document.getElementById('dirPath');
    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const initStatus = document.getElementById('initStatus');

    function addLog(message, isError = false) {
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML += `[${time}] ${isError ? '❌ ' : ''}${message}\n`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function updateStatus(message, type = 'info') {
        statusDiv.className = `show status-${type}`;
        statusDiv.textContent = message;
    }

    async function initFFmpeg() {
        try {
            // 💡 雙重相容性檢查：UMD 模組可能掛在 window.FFmpegWASM 或 window.FFmpeg 上
            let FFmpegModule = window.FFmpegWASM || window.FFmpeg;
            
            if (!FFmpegModule || !FFmpegModule.FFmpeg) {
                throw new Error('無法從 ffmpeg.min.js 提取全域 FFmpeg 類別。請確認該檔案已正確下載並部署。');
            }
            
            const FFmpegClass = FFmpegModule.FFmpeg;
            ffmpeg = new FFmpegClass();
            
            ffmpeg.on('log', ({ message }) => {
                if (message.includes('Error') || message.includes('Failed')) {
                    console.warn('FFmpeg核心提示:', message);
                }
            });

            ffmpeg.on('progress', ({ progress }) => {
                const percent = Math.round(progress * 100);
                progressFill.style.width = percent + '%';
                updateStatus(`🎬 影片壓縮中... ${percent}%`, 'info');
            });

            // 完全不帶參數，讓核心自動去同目錄抓 814.ffmpeg.js
            await ffmpeg.load();
            
            ffmpegReady = true;
            initStatus.className = 'init-status init-ready';
            initStatus.innerHTML = '✅ 本地託管核心已順利啟動！';
            btnStart.innerText = '開始壓縮並寫入資料夾';
            addLog('FFmpeg 本地安全核心載入成功 ✓');
            
            setTimeout(() => { initStatus.style.display = 'none'; }, 3000);
        } catch (err) {
            initStatus.className = 'init-status status-error';
            initStatus.innerHTML = `❌ 核心掛載失敗: ${err.message}<br><small>請按 F12 打開主控台 (Console) 查看詳細錯誤</small>`;
            addLog(`初始化失敗: ${err.message}`, true);
        }
    }

    if (document.readyState === 'complete') {
        initFFmpeg();
    } else {
        window.addEventListener('load', initFFmpeg);
    }

    // 1. 本地目錄直接讀取
    btnDir.addEventListener('click', async () => {
        try {
            dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            dirPathSpan.innerText = `📁 已對接目錄: ${dirHandle.name}`;
            addLog(`已成功開啟本地目錄: ${dirHandle.name}`);

            fileSelect.innerHTML = '<option value="">-- 請選擇影片檔案 --</option>';
            fileHandles.clear();

            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const lowerName = entry.name.toLowerCase();
                    if (entry.name.startsWith('AI_')) continue; 
                    
                    if (lowerName.endsWith('.mp4')) {
                        fileHandles.set(entry.name, entry);
                        const opt = document.createElement('option');
                        opt.value = entry.name;
                        opt.textContent = entry.name;
                        fileSelect.appendChild(opt);
                    }
                }
            }

            if (fileHandles.size > 0) {
                fileSelect.disabled = false;
                if (ffmpegReady) btnStart.disabled = false;
                updateStatus(`📁 成功對接，目錄下發現 ${fileHandles.size} 個支援的 MP4 檔案`, 'success');
            } else {
                updateStatus('⚠️ 該目錄下沒有找到標準 MP4 影片檔案', 'error');
                btnStart.disabled = true;
            }
        } catch (err) {
            if (err.name !== 'AbortError') updateStatus(`對接資料夾失敗: ${err.message}`, 'error');
        }
    });

    // 2. 核心轉碼
    btnStart.addEventListener('click', async () => {
        const fileName = fileSelect.value;
        if (!fileName || !ffmpegReady) return;

        const targetHeight = parseInt(resolutionSelect.value);
        let targetWidth = 854; 
        if (targetHeight === 360) targetWidth = 640;
        if (targetHeight === 540) targetWidth = 960;
        if (targetHeight === 720) targetWidth = 1280;

        btnStart.disabled = true;
        btnDir.disabled = true;
        fileSelect.disabled = true;
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';

        try {
            updateStatus('📥 正在對接大檔案管道，載入核心虛擬緩衝區...');
            addLog(`讀取高容量檔案: ${fileName}`);
            
            const fileHandle = fileHandles.get(fileName);
            const file = await fileHandle.getFile();
            
            // 安全相容提取 fetchFile
            let FFmpegModule = window.FFmpegWASM || window.FFmpeg;
            const videoData = await FFmpegModule.fetchFile(file);
            await ffmpeg.writeFile('input_large.mp4', videoData);
            
            addLog('檔案就緒，開始進行 16:9 黑框等比例渲染配置...');
            updateStatus('🎬 影片壓縮編碼已啟動...');

            const blackBoxFilter = `scale=${targetWidth}:${targetHeight}:force_original_aspect_ratio=decrease,pad=${targetWidth}:${targetHeight}:(ow-iw)/2:(oh-ih)/2:black`;
            const outName = `AI_${fileName}`;

            const args = [
                '-i', 'input_large.mp4',
                '-vf', blackBoxFilter,
                '-c:v', 'libx264',
                '-preset', 'superfast',      
                '-crf', '26',                
                '-threads', '4',             
                '-c:a', 'copy',              
                'output_compressed.mp4'
            ];

            await ffmpeg.exec(args);
            addLog('影片壓縮重編碼順利完成！正在同步至原本地資料夾...');
            updateStatus('💾 正在將成品同步寫回本地目錄，請勿關閉網頁...');

            const resultData = await ffmpeg.readFile('output_compressed.mp4');
            
            if (!resultData || resultData.length === 0) {
                throw new Error('壓縮異常，核心輸出了 0 字节檔案');
            }

            const newFileHandle = await dirHandle.getFileHandle(outName, { create: true });
            const writable = await newFileHandle.createWritable();
            await writable.write(resultData);
            await writable.close();

            updateStatus(`🎉 成功！檔案已存至原資料夾：${outName}`, 'success');
            addLog(`大檔案無損壓縮成功 -> 生成 ${outName}`);

            await ffmpeg.deleteFile('input_large.mp4');
            await ffmpeg.deleteFile('output_compressed.mp4');

        } catch (err) {
            updateStatus(`❌ 轉碼終止: ${err.message}`, 'error');
            addLog(`錯誤報告: ${err.message}`, true);
        } finally {
            btnStart.disabled = false;
            btnDir.disabled = false;
            fileSelect.disabled = false;
            btnStart.innerText = '開始壓縮並寫入資料夾';
            try { btnDir.click(); } catch(e){}
        }
    });
</script>

</body>
</html>
