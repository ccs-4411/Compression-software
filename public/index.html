<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 AI 影片壓縮 Pro（Server版）</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 500px;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
}

h1 {
    font-size: 20px;
    text-align: center;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
}

button {
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.status {
    margin-top: 15px;
    font-size: 14px;
    color: #93c5fd;
}

.progress {
    height: 6px;
    background: #334155;
    margin-top: 10px;
    border-radius: 4px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: #10b981;
}
</style>
</head>

<body>

<div class="container">
<h1>🎬 AI 影片壓縮（Server版）</h1>

<input type="file" id="file" accept="video/*">
<button onclick="upload()">開始壓縮</button>

<div class="progress"><div class="bar" id="bar"></div></div>
<div class="status" id="status">等待上傳...</div>
</div>

<script>

const RAILWAY_URL = "https://你的railway網址"; // ⭐ 改這裡

async function upload() {
    const file = document.getElementById("file").files[0];
    if (!file) return alert("請選影片");

    const status = document.getElementById("status");
    const bar = document.getElementById("bar");

    const form = new FormData();
    form.append("file", file);

    status.innerText = "📤 上傳中...";

    const xhr = new XMLHttpRequest();
    xhr.open("POST", `${RAILWAY_URL}/compress`);

    xhr.responseType = "blob";

    xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
            let p = (e.loaded / e.total) * 100;
            bar.style.width = p + "%";
            status.innerText = `📤 上傳中 ${Math.round(p)}%`;
        }
    };

    xhr.onload = () => {
        if (xhr.status === 200) {
            status.innerText = "✅ 壓縮完成，下載中...";

            const url = URL.createObjectURL(xhr.response);
            const a = document.createElement("a");
            a.href = url;
            a.download = "compressed.mp4";
            a.click();

            status.innerText = "🎉 完成！";
        } else {
            status.innerText = "❌ 壓縮失敗";
        }
    };

    xhr.send(form);
}

</script>

</body>
</html>
