<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 圖片本地壓縮工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #333;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #1d1d1f;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        select, button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
        }
        select:focus {
            outline: none;
            border-color: #0071e3;
        }
        button {
            background-color: #0071e3;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0077ed;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #log {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9fb;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .success { color: #34c759; }
        .error { color: #ff3b30; }
        .info { color: #0071e3; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI 圖片本地壓縮工具</h2>
    
    <div class="form-group">
        <label>1. 選擇來源圖片所在的資料夾</label>
        <button id="btnDir">選取資料夾</button>
        <span id="dirPath" style="font-size: 13px; color: #666; display:block; margin-top:5px;">尚未選擇資料夾</span>
    </div>

    <div class="form-group">
        <label for="fileSelect">2. 選擇要壓縮的檔案</label>
        <select id="fileSelect" disabled>
            <option value="">-- 請先選取資料夾 --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="resolution">3. 目標解析度（長邊縮放）</label>
        <select id="resolution">
            <option value="360">360p</option>
            <option value="480" selected>480p</option>
            <option value="540">540p</option>
            <option value="720">720p</option>
        </select>
    </div>

    <button id="btnStart" disabled>開始壓縮並存檔</button>

    <div id="log">系統就緒。請先選擇資料夾以讀取檔案。</div>
</div>

<script>
    let dirHandle = null;
    const fileHandles = new Map(); // 儲存檔名與對應的 fileHandle

    const btnDir = document.getElementById('btnDir');
    const fileSelect = document.getElementById('fileSelect');
    const resolutionSelect = document.getElementById('resolution');
    const btnStart = document.getElementById('btnStart');
    const logDiv = document.getElementById('log');
    const dirPathSpan = document.getElementById('dirPath');

    function log(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        const msgHtml = `<span class="${type}">[${time}] ${message}</span><br>`;
        logDiv.innerHTML += msgHtml;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 1. 點擊選擇資料夾
    btnDir.addEventListener('click', async () => {
        try {
            // 請求使用者選取資料夾，並給予讀寫權限
            dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            dirPathSpan.innerText = `已載入資料夾: ${dirHandle.name}`;
            log(`成功載入資料夾：${dirHandle.name}`, 'success');

            // 清空舊選單
            fileSelect.innerHTML = '<option value="">-- 請選擇檔案 --</option>';
            fileHandles.clear();

            // 走訪資料夾內的檔案
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const lowerName = entry.name.toLowerCase();
                    // 僅篩選常見圖片格式
                    if (lowerName.endsWith('.jpg') || lowerName.endsWith('.jpeg') || lowerName.endsWith('.png') || lowerName.endsWith('.webp')) {
                        fileHandles.set(entry.name, entry);
                        const opt = document.createElement('option');
                        opt.value = entry.name;
                        opt.textContent = entry.name;
                        fileSelect.appendChild(opt);
                    }
                }
            }

            if (fileHandles.size > 0) {
                fileSelect.disabled = false;
                btnStart.disabled = false;
                log(`找到 ${fileHandles.size} 個支援的圖片檔案。`, 'info');
            } else {
                log('該資料夾內沒有找到支援的圖片檔案 (JPG/PNG/WEBP)。', 'error');
            }

        } catch (err) {
            if (err.name !== 'AbortError') {
                log(`讀取資料夾失敗: ${err.message}`, 'error');
            }
        }
    });

    // 2. 點擊開始壓縮並寫回原資料夾
    btnStart.addEventListener('click', async () => {
        const fileName = fileSelect.value;
        if (!fileName) {
            log('請先選擇一個檔案！', 'error');
            return;
        }

        const targetSize = parseInt(resolutionSelect.value);
        log(`開始處理檔案: ${fileName} -> 目標解析度: ${targetSize}p`, 'info');

        try {
            // 取得原本檔案的 File 物件
            const fileHandle = fileHandles.get(fileName);
            const file = await fileHandle.getFile();
            
            // 將檔案轉為 Image 物件以獲取寬高
            const img = await loadImage(file);
            
            // 計算縮放比例（以長邊為基準進行等比例縮放）
            let targetWidth = img.width;
            let targetHeight = img.height;
            
            if (img.width > img.height) {
                if (img.width > targetSize) {
                    targetHeight = Math.round((img.height * targetSize) / img.width);
                    targetWidth = targetSize;
                }
            } else {
                if (img.height > targetSize) {
                    targetWidth = Math.round((img.width * targetSize) / img.height);
                    targetHeight = targetSize;
                }
            }

            // 使用 Canvas 進行重繪縮放
            const canvas = document.createElement('canvas');
            canvas.width = targetWidth;
            canvas.height = targetHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, targetWidth, targetHeight);

            // 轉成 Blob (預設使用原格式，若不支援則用 jpeg，品質設為 0.85)
            const mimeType = file.type || 'image/jpeg';
            const blob = await new Promise(resolve => canvas.toBlob(resolve, mimeType, 0.85));

            // 設定新檔名：前面加上 AI
            const newFileName = `AI_${fileName}`;
            log(`準備寫入新檔案: ${newFileName} (${targetWidth}x${targetHeight})`, 'info');

            // 在同一個資料夾下建立新檔案
            const newFileHandle = await dirHandle.getFileHandle(newFileName, { create: true });
            const writable = await newFileHandle.createWritable();
            await writable.write(blob);
            await writable.close();

            log(`成功存檔！位置：原資料夾/${newFileName}`, 'success');

            // 重新整理檔案選單，把新生成的 AI_ 檔案放進去（或者您可以自行過濾掉）
            fileHandles.set(newFileName, newFileHandle);
            const opt = document.createElement('option');
            opt.value = newFileName;
            opt.textContent = newFileName;
            fileSelect.appendChild(opt);

        } catch (err) {
            log(`壓縮或存檔失敗: ${err.message}`, 'error');
        }
    });

    // 輔助函式：將 File 轉為 Image 物件
    function loadImage(file) {
        return new Promise((resolve, reject) => {
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                URL.revokeObjectURL(url);
                resolve(img);
            };
            img.onerror = (err) => {
                URL.revokeObjectURL(url);
                reject(err);
            };
            img.src = url;
        });
    }
</script>

</body>
</html>
