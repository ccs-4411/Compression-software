<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 影片本地壓縮工具 (MP4)</title>    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #333;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 550px;
            width: 100%;
        }
        h2 { margin-top: 0; color: #1d1d1f; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        select:focus { outline: none; border-color: #0071e3; }
        button { background-color: #0071e3; color: white; border: none; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background-color: #0077ed; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #log {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9fb;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .success { color: #34c759; font-weight: bold; }
        .error { color: #ff3b30; font-weight: bold; }
        .info { color: #0071e3; }
        .process { color: #f5a623; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.11.6/ffmpeg.min.js"></script>   
</head>
<body>

<div class="container">
    <h2>AI 影片本地壓縮工具 (MP4)</h2>
    
    <div class="form-group">
        <label>1. 選擇影片所在的資料夾</label>
        <button id="btnDir">選取資料夾</button>
        <span id="dirPath" style="font-size: 13px; color: #666; display:block; margin-top:5px;">尚未選擇資料夾</span>
    </div>

    <div class="form-group">
        <label for="fileSelect">2. 選擇要壓縮的 MP4 影片</label>
        <select id="fileSelect" disabled>
            <option value="">-- 請先選取資料夾 --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="resolution">3. 目標解析度（長邊縮放）</label>
        <select id="resolution">
            <option value="360">360p</option>
            <option value="480" selected>480p</option>
            <option value="540">540p</option>
            <option value="720">720p</option>
        </select>
    </div>

    <button id="btnStart" disabled>載入元件中，請稍候...</button>
    <div id="log">系統正在初始化...</div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false }); // 設為 true 可在瀏覽器主控台看詳細進度

    let dirHandle = null;
    const fileHandles = new Map();

    const btnDir = document.getElementById('btnDir');
    const fileSelect = document.getElementById('fileSelect');
    const resolutionSelect = document.getElementById('resolution');
    const btnStart = document.getElementById('btnStart');
    const logDiv = document.getElementById('log');
    const dirPathSpan = document.getElementById('dirPath');

    function log(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML += `<span class="${type}">[${time}] ${message}</span><br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 初始化：載入 FFmpeg 核心核心（大約需要數秒）
    async function initFFmpeg() {
        try {
            log('正在下載並初始化網頁版影片壓縮核心...', 'info');
            await ffmpeg.load();
            log('影片壓縮核心載入成功！系統就緒。', 'success');
            btnStart.innerText = '開始壓縮並存檔';
        } catch (err) {
            log(`核心載入失敗，請重新整理網頁: ${err.message}`, 'error');
        }
    }
    initFFmpeg();

    // 監聽 FFmpeg 的內部進度日誌
    ffmpeg.setProgress(({ ratio }) => {
        if (ratio >= 0 && ratio <= 1) {
            btnStart.innerText = `壓縮中... ${Math.round(ratio * 100)}%`;
        }
    });

    // 1. 選取本地資料夾
    btnDir.addEventListener('click', async () => {
        try {
            dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            dirPathSpan.innerText = `已載入資料夾: ${dirHandle.name}`;
            log(`成功載入資料夾：${dirHandle.name}`, 'success');

            fileSelect.innerHTML = '<option value="">-- 請選擇檔案 --</option>';
            fileHandles.clear();

            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const lowerName = entry.name.toLowerCase();
                    // 過濾掉已經壓過的檔案，且只抓 MP4
                    if (entry.name.startsWith('AI_')) continue;
                    
                    if (lowerName.endsWith('.mp4')) {
                        fileHandles.set(entry.name, entry);
                        const opt = document.createElement('option');
                        opt.value = entry.name;
                        opt.textContent = entry.name;
                        fileSelect.appendChild(opt);
                    }
                }
            }

            if (fileHandles.size > 0) {
                fileSelect.disabled = false;
                btnStart.disabled = false;
                log(`找到 ${fileHandles.size} 個 MP4 影片檔案。`, 'info');
            } else {
                log('該資料夾內沒有找到支援的 .mp4 檔案。', 'error');
            }
        } catch (err) {
            if (err.name !== 'AbortError') log(`讀取資料夾失敗: ${err.message}`, 'error');
        }
    });

    // 2. 開始壓縮影片
    btnStart.addEventListener('click', async () => {
        const fileName = fileSelect.value;
        if (!fileName) {
            log('請先選擇一個影片檔案！', 'error');
            return;
        }

        const targetSize = resolutionSelect.value;
        btnStart.disabled = true;
        btnDir.disabled = true;
        fileSelect.disabled = true;

        try {
            log(`正在讀取影片原始資料: ${fileName}...`, 'info');
            const fileHandle = fileHandles.get(fileName);
            const file = await fileHandle.getFile();
            
            // 把檔案寫入 FFmpeg 的虛擬記憶體檔案系統中
            ffmpeg.FS('writeFile', fileName, await fetchFile(file));
            
            log(`影片讀取完成，開始進行解析度調整 (${targetSize}p)... 過程中網頁可能反應較慢，請勿關閉視窗。`, 'process');

            // FFmpeg 濾鏡指令：自動判斷橫豎幅，將長邊縮小到 targetSize，另一邊等比例縮放（且維持偶數像素以符合 MP4 規範）
            const scaleFilter = `scale='if(gt(iw,ih),min(${targetSize},iw),-2)':'if(gt(iw,ih),-2,min(${targetSize},ih))'`;
            
            const outName = `AI_${fileName}`;

            // 執行壓縮指令
            // -preset ultrafast 用最快速度壓制以防瀏覽器崩潰；-crf 26 在檔案大小與畫質間取得折衷
            await ffmpeg.run(
                '-i', fileName,
                '-vf', scaleFilter,
                '-c:v', 'libx264',
                '-preset', 'ultrafast',
                '-crf', '26',
                '-c:a', 'copy', // 音訊直接複製不重編碼，節省時間
                outName
            );

            log(`影片重編碼完成！正在將新檔案寫回您的資料夾...`, 'info');

            // 從 FFmpeg 虛擬記憶體讀出壓縮完的檔案
            const data = ffmpeg.FS('readFile', outName);

            // 建立本地檔案並寫入
            const newFileHandle = await dirHandle.getFileHandle(outName, { create: true });
            const writable = await newFileHandle.createWritable();
            await writable.write(data);
            await writable.close();

            log(`🎉 成功存檔！輸出檔名：${outName}`, 'success');

            // 釋放虛擬記憶體
            ffmpeg.FS('unlink', fileName);
            ffmpeg.FS('unlink', outName);

        } catch (err) {
            log(`影片壓縮失敗: ${err.message}`, 'error');
        } finally {
            // 還原按鈕狀態
            btnStart.disabled = false;
            btnDir.disabled = false;
            fileSelect.disabled = false;
            btnStart.innerText = '開始壓縮並存檔';
        }
    });
</script>

</body>
</html>
